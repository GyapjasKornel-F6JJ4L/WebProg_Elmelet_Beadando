<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web alkalmazás - JavaScript CRUD</title>
    <link rel="stylesheet" href="css/indexStyle.css" />
    <link rel="stylesheet" href="css/javascriptStyle.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-content">
        <h1>Web-programozás I Előadás Házi feladat</h1>
      </div>
      <input type="checkbox" id="menu-toggle" class="checkbox"/>
      <label for="menu-toggle" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <nav class="header-menu">
        <a href="index.html">Főoldal</a>
        <a href="javascript.html">JavaScript Menü</a>
        <a href="react.html">React menü</a>
        <a href="#">SPA menü</a>
        <a href="#">Fetch API menü</a>
        <a href="axios.html">Axios menü</a>
        <a href="oojs.html">OOJS menü</a>
      </nav>
    </header>
    
    <main>
      <h2>Gépek kezelése (CRUD)</h2>
      
      <div class="form-container">
        <h3 id="form-title">Új gép hozzáadása</h3>
        <form id="crud-form">
          <input type="hidden" id="user-id">
          <div class="form-group">
            <label for="hely">Hely:</label>
            <input type="text" id="hely" required>
          </div>
          <div class="form-group">
            <label for="tipus">Típus:</label>
            <input type="text" id="tipus" required>
          </div>
          <div class="form-group">
            <label for="ipcim">IP Cím:</label>
            <input type="text" id="ipcim" required>
          </div>
          <div>
            <button type="submit" class="btn btn-primary" id="submit-btn">Mentés</button>
            <button type="button" class="btn btn-secondary" id="cancel-btn" style="display: none;">Mégse</button>
          </div>
        </form>
      </div>

      <table id="users-table">
        <thead>
          <tr>
            <th style="width: 5%;">ID</th>
            <th style="width: 20%;">Hely</th>
            <th style="width: 20%;">Típus</th>
            <th style="width: 25%;">IP Cím</th>
            <th style="width: 30%;">Műveletek</th>
          </tr>
        </thead>
        <tbody>
          <!-- Tartalom ide kerül -->
        </tbody>
      </table>
    </main>

    <footer class="footer">
      <p>Gyapjas Kornél (F6JJ4L)</p>
      <p>Ember Richárd (MLY59O)</p>
    </footer>

    <script src="javascript/javascript.js"></script>
  </body>
</html>
