<!doctype html>
<html lang="hu">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web alkalmazás - React + Axios CRUD</title>
  <link rel="stylesheet" href="css/indexStyle.css" />
  <link rel="stylesheet" href="css/javascriptStyle.css" />

  <!-- React és ReactDOM (Babel standalone segítségével futtatjuk a JSX-et helyben) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel Standalone (A böngészőben fordítja le a JSX-et) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Axios CDN a szerver-kliens kommunikációhoz -->
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>

<body>
  <header class="header">
    <div class="header-content">
      <h1>Web-programozás I Előadás Házi feladat</h1>
    </div>
    <input type="checkbox" id="menu-toggle" class="checkbox" />
    <label for="menu-toggle" class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </label>
    <nav class="header-menu">
      <a href="index.html">Főoldal</a>
      <a href="javascript.html">JavaScript Menü</a>
      <a href="react.html">React menü</a>
      <a href="#">SPA menü</a>
      <a href="#">Fetch API menü</a>
      <a href="axios.php">Axios menü</a>
      <a href="oojs.html">OOJS menü</a>
    </nav>
  </header>

  <div id="root"></div>

  <footer class="footer">
    <p>Gyapjas Kornél (F6JJ4L)</p>
    <p>Ember Richárd (MLY59O)</p>
  </footer>

  <!-- React kód (JSX-el írva, Babel fordítja le) -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    const App = () => {
      const [softwareList, setSoftwareList] = useState([]);
      const [formData, setFormData] = useState({
        id: '',
        nev: '',
        kategoria: ''
      });
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const API_URL = 'php/api.php';

      const fetchSoftware = async () => {
        setLoading(true);
        try {
          const response = await axios.get(API_URL);
          setSoftwareList(response.data);
          setError('');
        } catch (err) {
          setError('Hiba történt az adatok betöltésekor: ' + err.message);
          console.error(err);
        } finally {
          setLoading(false);
        }
      };

      // Komponens betöltésekor lefuttatjuk az adatok lekérését
      useEffect(() => {
        fetchSoftware();
      }, []);

      const handleInputChange = (e) => {
        const { id, value } = e.target;
        setFormData({
          ...formData,
          [id]: value
        });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();

        if (!formData.nev || !formData.kategoria) {
          alert('Kérjük töltsön ki minden kötelező mezőt!');
          return;
        }

        try {
          if (formData.id) {
            // Meglévő szoftver frissítése (Update)
            await axios.put(API_URL, {
              id: formData.id,
              nev: formData.nev,
              kategoria: formData.kategoria
            });
          } else {
            // Új szoftver hozzáadása (Create)
            await axios.post(API_URL, {
              nev: formData.nev,
              kategoria: formData.kategoria
            });
          }
          // Szövegmezők ürítése és lista újra-lekérése
          setFormData({ id: '', nev: '', kategoria: '' });
          fetchSoftware();
        } catch (err) {
          console.error(err);
          alert('Hiba történt az adatmentés során!');
        }
      };

      const handleEdit = (software) => {
        // A szerkesztendő szoftver adatait betöltjük a form-ba
        setFormData({ ...software });
        window.scrollTo({
          top: 0,
          behavior: 'smooth'
        });
      };

      const handleDelete = async (id) => {
        if (window.confirm(`Biztosan törölni szeretné a(z) ${id} azonosítójú szoftvert?`)) {
          try {
            // Szoftver törlése az adatbázisból (Delete)
            await axios.delete(`${API_URL}?id=${id}`);
            fetchSoftware();
          } catch (err) {
            console.error(err);
            alert('Hiba történt a törlés során!');
          }
        }
      };

      const handleCancel = () => {
        setFormData({
          id: '',
          nev: '',
          kategoria: ''
        });
      };

      return (
        <main>
          <h2>Szoftverleltár (React + Axios CRUD, MySQL Adatbázis)</h2>

          {error && <p style={{ color: 'red', fontWeight: 'bold' }}>{error}</p>}

          <div className="form-container">
            <h3>{formData.id ? `Szoftver szerkesztése (ID: ${formData.id})` : 'Új szoftver hozzáadása'}</h3>
            <form onSubmit={handleSubmit}>
              <div className="form-group">
                <label htmlFor="nev">Név / Szoftver:</label>
                <input
                  type="text"
                  id="nev"
                  value={formData.nev}
                  onChange={handleInputChange}
                  required
                />
              </div>
              <div className="form-group">
                <label htmlFor="kategoria">Kategória:</label>
                <input
                  type="text"
                  id="kategoria"
                  value={formData.kategoria}
                  onChange={handleInputChange}
                  required
                />
              </div>
              <div>
                <button type="submit" className="btn btn-primary">Mentés</button>
                {formData.id && (
                  <button
                    type="button"
                    className="btn btn-secondary"
                    onClick={handleCancel}
                    style={{ marginLeft: '5px' }}
                  >
                    Mégse
                  </button>
                )}
              </div>
            </form>
          </div>

          {loading ? (
            <p>Adatok töltése folyamatban...</p>
          ) : (
            <table>
              <thead>
                <tr>
                  <th style={{ width: '10%' }}>ID</th>
                  <th style={{ width: '35%' }}>Név</th>
                  <th style={{ width: '25%' }}>Kategória</th>
                  <th style={{ width: '30%' }}>Műveletek</th>
                </tr>
              </thead>
              <tbody>
                {softwareList.length > 0 ? (
                  softwareList.map(software => (
                    <tr key={software.id}>
                      <td>{software.id}</td>
                      <td>{software.nev}</td>
                      <td>{software.kategoria}</td>
                      <td className="actions">
                        <button
                          className="btn btn-warning"
                          onClick={() => handleEdit(software)}
                        >
                          Szerkesztés
                        </button>
                        <button
                          className="btn btn-danger"
                          onClick={() => handleDelete(software.id)}
                        >
                          Törlés
                        </button>
                      </td>
                    </tr>
                  ))
                ) : (
                  <tr>
                    <td colSpan="4" style={{ textAlign: "center" }}>Nincs elérhető adat az adatbázisban.</td>
                  </tr>
                )}
              </tbody>
            </table>
          )}
        </main>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
